name: Release (manual)

# Operator-triggered release for testing the pipeline. Defaults to draft; flip the
# `publish` input to release immediately. Delegates to _release.yml.
#
# CAVEAT — attestation identity: a workflow_dispatch run executes on a branch ref, so
# the attestation certificate names .../workflows/_release.yml@refs/heads/<branch>,
# NOT @refs/tags/. pkg0 clients verifying with the derived tag-pinned regexp (its own
# selfupdate included) will see an identity mismatch: trust prompt when interactive,
# HOLD when not. Real releases should go through release-tag.yml (push a v* tag);
# use this one to exercise the pipeline.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (no v prefix, e.g. 0.1.0)'
        required: true
        type: string
      publish:
        description: 'Publish immediately (otherwise creates a draft)'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
      draft: ${{ steps.compute.outputs.draft }}
    steps:
      - id: compute
        shell: bash
        run: |
          version="${{ inputs.version }}"
          tag="v${version}"
          if [[ "${{ inputs.publish }}" == "true" ]]; then
            draft="false"
          else
            draft="true"
          fi
          if [[ ! "$version" =~ ^[0-9][A-Za-z0-9.+~]*$ ]]; then
            echo "::error::Invalid version: '$version'"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$version tag=$tag draft=$draft"

  pipeline:
    name: Build, attest, publish
    needs: resolve
    uses: ./.github/workflows/_release.yml
    with:
      version: ${{ needs.resolve.outputs.version }}
      tag: ${{ needs.resolve.outputs.tag }}
      draft: ${{ needs.resolve.outputs.draft == 'true' }}
    secrets: inherit
