name: CI

# Lint + build + install smoke on every push/PR. The release pipeline
# (_release.yml) runs a superset of this; keeping a cheap standalone copy here
# means a broken commit is caught before anyone cuts a tag.

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Lint, build, smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Lint
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          bash -n pkg0
          shellcheck -x pkg0 packaging/build-deb.sh packaging/postinst

      - name: Build & install deb
        run: |
          set -euxo pipefail
          sh packaging/build-deb.sh "0.0.0+ci" "$GITHUB_REPOSITORY"
          sudo apt-get install -y ./pkg0_0.0.0+ci_all.deb
          pkg0 version
          jq -e '.[] | select(.pkg_name == "pkg0" and .attest == "required")' /var/lib/pkg0/state.json
          pkg0 list
          sudo apt-get remove -y pkg0
